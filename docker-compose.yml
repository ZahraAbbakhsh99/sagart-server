version: '3.8'

services:
  postgres_sagart:
    image: postgres:16-alpine
    container_name: sagart_postgres      
    environment:
      POSTGRES_USER: sagartUser        
      POSTGRES_PASSWORD: sagartPass05    
      POSTGRES_DB: sagart_db                
    ports:
      - "5433:5432"               
    volumes:
      - sagart_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sagart_postgres_data:                